apply plugin: 'com.android.library'

android {
    compileSdkVersion project.properties.sdk_version

    defaultConfig {
        minSdkVersion 19
    }

    compileOptions {
        sourceCompatibility 1.8
        targetCompatibility 1.8
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    maven {
        url 'https://github.com/kshoji/javax.sound.midi-for-Android/raw/develop/javax.sound.midi/repository'
    }
    mavenCentral()
}

dependencies {
    api 'jp.kshoji:javax-sound-midi:0.0.4-SNAPSHOT:@aar'
    //noinspection GradleDependency
    api 'androidx.annotation:annotation:1.0.0'
    api fileTree(dir: 'libs', include: ['*.jar'])
}

apply plugin: 'maven'
group = 'jp.kshoji'
uploadArchives {
    repositories.mavenDeployer {
        repository url: 'file://' + file('../library/repository').absolutePath
        pom.version = '0.0.10-SNAPSHOT'
        pom.artifactId = 'ble-midi'
    }
}
task install(dependsOn: uploadArchives)
